# Deploys the static site to Cloudflare Pages on every push to main that
# touches a web asset. The site has no build step — the repo root is deployed
# as-is via Wrangler. Wrangler automatically excludes .git and node_modules.
#
# Required GitHub Secrets (configure once in repo Settings → Secrets and variables → Actions):
#   • CLOUDFLARE_API_TOKEN — token with "Edit Cloudflare Pages" permission
#   • CLOUDFLARE_ACCOUNT_ID — found on the right sidebar of dash.cloudflare.com
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'lib/**'
      - 'views/**'
      - 'data/**'
      - 'styles/**'
      - 'logo.gif'
      - 'requests.json'
      - 'team-files.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler@latest pages deploy . \
            --project-name=team-navigator \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
