# Applies new SQL migrations from supabase/migrations/ to the live Supabase project
# whenever something is pushed to main that touches that folder.
#
# Required GitHub Secrets (configure once in repo Settings → Secrets and variables → Actions):
#   • SUPABASE_ACCESS_TOKEN — personal access token from supabase.com/dashboard/account/tokens
#   • SUPABASE_DB_PASSWORD  — DB password from project settings → Database
#
# The project ref is hard-coded (xnbptxxumzigizgwegut) since this repo only deploys one app.
name: Apply Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch: {}

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref xnbptxxumzigizgwegut
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply migrations
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
